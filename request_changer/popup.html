<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
    }

    .header {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-section {
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle-label {
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-switch {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.2);
      transition: .3s;
      border-radius: 30px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #10b981;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .status-text {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 5px;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .preset-btn {
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .preset-btn.active {
      background: rgba(16, 185, 129, 0.3);
      border-color: rgba(16, 185, 129, 0.5);
    }

    .custom-section {
      margin-top: 15px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
      opacity: 0.9;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-family: 'Courier New', monospace;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: rgba(16, 185, 129, 0.3);
      border: 1px solid rgba(16, 185, 129, 0.5);
      color: #fff;
    }

    .btn-primary:hover {
      background: rgba(16, 185, 129, 0.4);
    }

    .headers-section {
      max-height: 200px;
      overflow-y: auto;
    }

    .header-item {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .header-input {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
    }

    .header-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
    }

    .btn-remove {
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    .btn-remove:hover {
      background: rgba(239, 68, 68, 0.4);
    }

    .btn-add {
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .btn-add:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔧 Request Manipulator</h1>
  </div>

  <div class="toggle-section">
    <div class="toggle-container">
      <div class="toggle-label">
        <span>⚡ Extension Status</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="status-text" id="statusText">Extension is disabled</div>
  </div>

  <div class="section">
    <div class="section-title">🌐 Browser Presets</div>
    <div class="preset-grid">
      <button class="preset-btn" data-preset="chrome">
        <span>Chrome</span>
      </button>
      <button class="preset-btn" data-preset="firefox">
        <span>Firefox</span>
      </button>
      <button class="preset-btn" data-preset="safari">
        <span>Safari</span>
      </button>
      <button class="preset-btn" data-preset="edge">
        <span>Edge</span>
      </button>
      <button class="preset-btn" data-preset="opera">
        <span>Opera</span>
      </button>
      <button class="preset-btn" data-preset="ie">
        <span>IE 11</span>
      </button>
    </div>

    <div class="custom-section">
      <div class="form-group">
        <label class="form-label">🎭 Custom User-Agent</label>
        <textarea class="form-input" id="userAgentInput" rows="3" placeholder="Enter custom User-Agent string..."></textarea>
      </div>
      <button class="btn btn-primary" id="applyUserAgent">
        💾 Apply User-Agent
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📝 Custom Headers</div>
    <div class="headers-section" id="headersList"></div>
    <button class="btn btn-add" id="addHeader">
      ➕ Add Custom Header
    </button>
    <button class="btn btn-primary" id="applyHeaders" style="margin-top: 10px;">
      💾 Apply Headers
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
