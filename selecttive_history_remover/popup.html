<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 450px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .header {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-select {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      flex: 1;
    }

    .btn-select:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-delete {
      background: #ef4444;
      color: #fff;
      flex: 1;
    }

    .btn-delete:hover {
      background: #dc2626;
    }

    .btn-delete:disabled {
      background: rgba(239, 68, 68, 0.5);
      cursor: not-allowed;
    }

    .search-box {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .search-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
    }

    .domains-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .domain-item {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .domain-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .domain-item.selected {
      background: rgba(255, 255, 255, 0.1);
    }

    .checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .domain-info {
      flex: 1;
    }

    .domain-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .domain-count {
      font-size: 12px;
      opacity: 0.7;
    }

    .loading {
      padding: 40px 20px;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
    }

    .status {
      padding: 12px 20px;
      text-align: center;
      font-size: 13px;
      background: rgba(16, 185, 129, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🗑️ Domain History Cleaner</h1>
  </div>

  <div class="controls">
    <button class="btn btn-select" id="selectAll">✅ Select All</button>
    <button class="btn btn-select" id="deselectAll">❌ Deselect All</button>
    <button class="btn btn-delete" id="deleteBtn" disabled>🔥 Delete Selected</button>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search domains...">
  </div>

  <div id="status" class="status" style="display: none;"></div>

  <div class="domains-list" id="domainsList">
    <div class="loading">⏳ Loading history...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
